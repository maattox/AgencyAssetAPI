# ========================================
# GitHub Actions CI/CD Pipeline: .NET Build & Deploy
# ========================================
#
# Triggered: On push to master branch or pull requests to master
# Stages:
#   1. Build: Restore packages, compile, publish for release
#   2. Deploy: (master push only) Deploy published artifact to Azure App Service
#
# Demonstrates:
#   - Conditional deployment (only on master push, not PRs)
#   - Artifact passing between jobs
#   - Azure App Service deployment with publish profile
#   - GitHub Secrets for secure credential storage

name: .NET

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  # ========================================
  # Job 1: Build & Publish
  # ========================================
  # Compiles the .NET application and produces deployment artifacts.
  build:

    runs-on: ubuntu-latest

    steps:
    # Check out source code
    - uses: actions/checkout@v4

    # Set up .NET 10 runtime
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    # Restore NuGet packages
    - name: Restore dependencies
      run: dotnet restore

    # Compile in Release mode
    - name: Build
      run: dotnet build --configuration Release --no-restore

    # Publish for deployment
    - name: Publish
      run: dotnet publish --configuration Release -o ./publish

    # Upload publish folder as artifact for deploy job
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
       name: published-app
       path: ./publish

  # ========================================
  # Job 2: Deploy to Azure (master push only)
  # ========================================
  # Deploys the built artifact to Azure App Service.
  # Only runs on master branch pushes (not on PRs).
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      # Download the artifact from the build job
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: published-app
          path: ./publish

      # Deploy to Azure App Service using publish profile
      # AZURE_WEBAPP_PUBLISH_PROFILE secret contains the XML profile from Azure
      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'agencyasset-api'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish
